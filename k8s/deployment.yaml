apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-agentic-platform
  labels:
    app: enterprise-agentic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-agentic-platform
  template:
    metadata:
      labels:
        app: enterprise-agentic-platform
    spec:
      containers:
        - name: platform
          image: enterprise-agentic-platform:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: platform-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10